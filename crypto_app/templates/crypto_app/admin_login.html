{% extends 'crypto_app/base.html' %}
{% block title %}Admin Login — CryptoPredictor{% endblock %}
{% block extra_css %}
<style>
.auth-wrapper { min-height:85vh;display:flex;align-items:center;background:radial-gradient(ellipse at center,rgba(0,212,255,.07) 0%,transparent 70%); }
.auth-card { background:var(--card-bg);border:1px solid rgba(0,212,255,.3);border-radius:20px;padding:40px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5); }
.auth-title { font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;color:var(--accent);margin-bottom:5px; }
.form-control { background:rgba(255,255,255,.05)!important;border:1px solid rgba(0,212,255,.3)!important;color:#fff!important;border-radius:10px;padding:12px 16px; }
.form-control:focus { border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(0,212,255,.15)!important;background:rgba(255,255,255,.08)!important; }
.input-group-text { background:rgba(0,212,255,.1)!important;border:1px solid rgba(0,212,255,.3)!important;color:var(--accent)!important; }
.btn-admin { background:linear-gradient(135deg,#00d4ff,#0099bb);border:none;color:#000;font-weight:700;border-radius:8px; }
.btn-admin:hover { transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,212,255,.4); }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="container d-flex justify-content-center">
    <div class="auth-card">
      <div class="text-center mb-4">
        <i class="fas fa-shield-alt" style="font-size:3rem;color:var(--accent)"></i>
        <div class="auth-title mt-2">ADMIN LOGIN</div>
        <p style="color:#888">Administrator access only</p>
      </div>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label" style="color:#aaa">Admin Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user-shield"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Admin username" required/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label" style="color:#aaa">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-key"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Admin password" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-admin w-100 py-3">
          <i class="fas fa-sign-in-alt me-2"></i>Admin Login
        </button>
      </form>
      <hr style="border-color:rgba(255,255,255,.1);margin:24px 0"/>
      <div class="text-center">
        <a href="{% url 'login' %}" style="color:var(--primary)"><i class="fas fa-arrow-left me-1"></i>Back to User Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
