{% extends 'crypto_app/base.html' %}
{% block title %}User Login — CryptoPredictor{% endblock %}
{% block extra_css %}
<style>
.auth-wrapper {
  min-height: 85vh; display:flex; align-items:center;
  background: radial-gradient(ellipse at center, rgba(247,147,26,.07) 0%, transparent 70%);
}
.auth-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 40px;
  max-width: 460px; width:100%;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.auth-title {
  font-family:'Orbitron',sans-serif;
  font-size:1.8rem; font-weight:900;
  color:var(--primary); margin-bottom:5px;
}
.form-control, .form-select {
  background: rgba(255,255,255,.05) !important;
  border: 1px solid rgba(247,147,26,.3) !important;
  color: #fff !important; border-radius:10px; padding:12px 16px;
}
.form-control:focus, .form-select:focus {
  border-color: var(--primary) !important;
  box-shadow: 0 0 0 3px rgba(247,147,26,.15) !important;
  background: rgba(255,255,255,.08) !important;
}
.form-label { color:#aaa; font-weight:500; }
.input-group-text {
  background: rgba(247,147,26,.15) !important;
  border: 1px solid rgba(247,147,26,.3) !important;
  color: var(--primary) !important;
}
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="container d-flex justify-content-center">
    <div class="auth-card">
      <div class="text-center mb-4">
        <img src="https://bitcoin.org/img/icons/opengraph.png" width="60" class="rounded-circle mb-3" alt="BTC"/>
        <div class="auth-title">USER LOGIN</div>
        <p style="color:#888">Sign in to your CryptoPredictor account</p>
      </div>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-crypto w-100 py-3">
          <i class="fas fa-sign-in-alt me-2"></i>Login
        </button>
      </form>
      <hr style="border-color:rgba(255,255,255,.1);margin:24px 0"/>
      <div class="text-center">
        <p style="color:#888">Don't have an account? <a href="{% url 'register' %}" style="color:var(--primary)">Register here</a></p>
        <p style="color:#888;margin-top:10px">Admin? <a href="{% url 'admin_login' %}" style="color:var(--accent)">Admin Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
