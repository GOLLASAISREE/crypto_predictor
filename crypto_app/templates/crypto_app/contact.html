{% extends 'crypto_app/base.html' %}
{% block title %}Contact — CryptoPredictor{% endblock %}
{% block extra_css %}
<style>
.form-control{background:rgba(255,255,255,.05)!important;border:1px solid rgba(247,147,26,.3)!important;color:#fff!important;border-radius:10px;padding:12px 16px;}
.form-control:focus{border-color:var(--primary)!important;box-shadow:0 0 0 3px rgba(247,147,26,.15)!important;}
.form-label{color:#aaa;font-weight:500;}
</style>
{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:600px">
  <div class="text-center mb-5">
    <h2 style="font-family:'Orbitron',sans-serif;color:var(--primary);font-weight:900">CONTACT US</h2>
    <p style="color:#888">Have questions? We're here to help.</p>
  </div>
  <div class="card-crypto p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control" placeholder="Your name" required/>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="your@email.com" required/>
      </div>
      <div class="mb-4">
        <label class="form-label">Message</label>
        <textarea name="message" class="form-control" rows="5" placeholder="Your message..." required></textarea>
      </div>
      <button type="submit" class="btn btn-crypto w-100 py-3">
        <i class="fas fa-paper-plane me-2"></i>Send Message
      </button>
    </form>
  </div>
</div>
{% endblock %}
