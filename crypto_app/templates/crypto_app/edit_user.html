{% extends 'crypto_app/base.html' %}
{% block title %}Edit User — Admin{% endblock %}
{% block extra_css %}
<style>
.form-control,.form-select,.form-check-input { background:rgba(255,255,255,.05)!important;border:1px solid rgba(0,212,255,.3)!important;color:#fff!important;border-radius:10px;padding:12px 16px; }
.form-control:focus,.form-select:focus { border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(0,212,255,.15)!important; }
.form-label { color:#aaa;font-weight:500; }
</style>
{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:600px">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 style="font-family:'Orbitron',sans-serif;color:var(--accent);font-weight:900"><i class="fas fa-user-edit me-2"></i>EDIT USER</h2>
    <a href="{% url 'manage_users' %}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Back</a>
  </div>
  <div class="card-crypto p-4">
    <div class="mb-4 p-3" style="background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);border-radius:12px">
      <strong style="color:var(--accent)">Editing:</strong> <span style="color:#fff">{{ target_user.username }}</span>
      <span class="badge-algo ms-2">{{ target_user.email }}</span>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-6">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" class="form-control" value="{{ target_user.first_name }}"/>
        </div>
        <div class="col-6">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control" value="{{ target_user.last_name }}"/>
        </div>
        <div class="col-12">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="{{ target_user.email }}"/>
        </div>
        <div class="col-12">
          <div class="d-flex align-items-center gap-3 p-3" style="background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.08)">
            <input type="checkbox" name="is_active" id="isActive" class="form-check-input" style="width:22px;height:22px" {% if target_user.is_active %}checked{% endif %}/>
            <label for="isActive" class="form-label mb-0">Account Active (uncheck to deactivate user)</label>
          </div>
        </div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-crypto flex-fill py-3">
          <i class="fas fa-save me-2"></i>Save Changes
        </button>
        <a href="{% url 'manage_users' %}" class="btn btn-outline-secondary px-4">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
